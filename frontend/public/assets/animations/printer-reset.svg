<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#fefce8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="24" fill="url(#bg)"/>
  <text x="120" y="95" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    Animation: Printer reset &amp; online check
  </text>
  <rect x="110" y="130" width="580" height="260" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
  <g transform="translate(200,265)">
    <rect x="-80" y="-40" width="220" height="130" rx="16" fill="#0f172a" opacity="0.08"/>
    <rect x="-70" y="-30" width="200" height="60" rx="12" fill="#111827" opacity="0.25"/>
    <rect x="-50" y="20" width="160" height="70" rx="12" fill="#111827" opacity="0.18"/>
    <rect x="-30" y="-10" width="120" height="28" rx="8" fill="#22c55e" opacity="0.35"/>
  </g>
  <text x="390" y="200" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111827">
    1) Check cables / Wi‑Fi
  </text>
  <text x="390" y="240" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111827">
    2) Clear print queue
  </text>
  <text x="390" y="280" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111827">
    3) Power cycle printer (30 sec)
  </text>
  <text x="390" y="320" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111827">
    4) Try test print
  </text>
</svg>

